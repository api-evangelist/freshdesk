  /search/tickets:
    get:
      operationId: searchTickets
      summary: Search tickets
      description: >-
        Searches for tickets using Freshdesk query language. Supports filtering
        by any ticket field using a SQL-like query syntax.
      tags:
        - Search
      parameters:
        - name: query
          in: query
          required: true
          description: >-
            Search query using Freshdesk query language, e.g.
            "priority:1 AND status:2".
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: >-
                      Total number of matching tickets.
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticket'
        '401':
          $ref: '#/components/responses/Unauthorized'
