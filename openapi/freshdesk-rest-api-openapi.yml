components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        Freshdesk uses API key-based authentication. Pass your API key as the
        username with any string (e.g. X) as the password using HTTP Basic
        Authentication.
  parameters:
    page:
      name: page
      in: query
      description: >-
        Page number for paginated results.
      schema:
        type: integer
        minimum: 1
        default: 1
    perPage:
      name: per_page
      in: query
      description: >-
        Number of results per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    ticketId:
      name: ticket_id
      in: path
      required: true
      description: >-
        Unique identifier of the ticket.
      schema:
        type: integer
        format: int64
    conversationId:
      name: conversation_id
      in: path
      required: true
      description: >-
        Unique identifier of the conversation.
      schema:
        type: integer
        format: int64
    contactId:
      name: contact_id
      in: path
      required: true
      description: >-
        Unique identifier of the contact.
      schema:
        type: integer
        format: int64
    companyId:
      name: company_id
      in: path
      required: true
      description: >-
        Unique identifier of the company.
      schema:
        type: integer
        format: int64
    agentId:
      name: agent_id
      in: path
      required: true
      description: >-
        Unique identifier of the agent.
      schema:
        type: integer
        format: int64
    groupId:
      name: group_id
      in: path
      required: true
      description: >-
        Unique identifier of the group.
      schema:
        type: integer
        format: int64
    roleId:
      name: role_id
      in: path
      required: true
      description: >-
        Unique identifier of the role.
      schema:
        type: integer
        format: int64
    productId:
      name: product_id
      in: path
      required: true
      description: >-
        Unique identifier of the product.
      schema:
        type: integer
        format: int64
    emailConfigId:
      name: email_config_id
      in: path
      required: true
      description: >-
        Unique identifier of the email configuration.
      schema:
        type: integer
        format: int64
    slaPolicyId:
      name: sla_policy_id
      in: path
      required: true
      description: >-
        Unique identifier of the SLA policy.
      schema:
        type: integer
        format: int64
    businessHourId:
      name: business_hour_id
      in: path
      required: true
      description: >-
        Unique identifier of the business hour schedule.
      schema:
        type: integer
        format: int64
    timeEntryId:
      name: time_entry_id
      in: path
      required: true
      description: >-
        Unique identifier of the time entry.
      schema:
        type: integer
        format: int64
    categoryId:
      name: category_id
      in: path
      required: true
      description: >-
        Unique identifier of the solution category.
      schema:
        type: integer
        format: int64
    folderId:
      name: folder_id
      in: path
      required: true
      description: >-
        Unique identifier of the solution folder.
      schema:
        type: integer
        format: int64
    articleId:
      name: article_id
      in: path
      required: true
      description: >-
        Unique identifier of the solution article.
      schema:
        type: integer
        format: int64
  schemas:
    Ticket:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: >-
            Unique identifier of the ticket.
        subject:
          type: string
          description: >-
            Subject of the ticket.
        description:
          type: string
          description: >-
            HTML content of the ticket description.
        description_text:
          type: string
          description: >-
            Plain-text content of the ticket description.
        status:
          type: integer
          description: >-
            Status of the ticket. 2=Open, 3=Pending, 4=Resolved, 5=Closed.
          enum:
            - 2
            - 3
            - 4
            - 5
        priority:
          type: integer
          description: >-
            Priority of the ticket. 1=Low, 2=Medium, 3=High, 4=Urgent.
          enum:
            - 1
            - 2
            - 3
            - 4
        source:
          type: integer
          description: >-
            Channel through which the ticket was created. 1=Email, 2=Portal,
            3=Phone, 7=Chat, 9=Feedback Widget, 10=Outbound Email.
          enum:
            - 1
            - 2
            - 3
            - 7
            - 9
            - 10
        type:
          type: string
          nullable: true
          description: >-
            Type of the ticket, e.g. Question, Incident, Problem, Feature
            Request.
        requester_id:
          type: integer
          format: int64
          description: >-
            ID of the contact who raised the ticket.
        responder_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            ID of the agent assigned to the ticket.
        group_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            ID of the group the ticket is assigned to.
        product_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            ID of the product associated with the ticket.
        company_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            ID of the company associated with the ticket.
        email_config_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            ID of the email configuration used for the ticket.
        cc_emails:
          type: array
          items:
            type: string
            format: email
          description: >-
            Email addresses CC'd on the ticket.
        fwd_emails:
          type: array
          items:
            type: string
            format: email
          description: >-
            Email addresses the ticket was forwarded to.
        reply_cc_emails:
          type: array
          items:
            type: string
            format: email
          description: >-
            Email addresses CC'd on replies.
        to_emails:
          type: array
          items:
            type: string
            format: email
          nullable: true
          description: >-
            Email addresses in the To field.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags associated with the ticket.
        custom_fields:
          type: object
          additionalProperties: true
          description: >-
            Custom fields set on the ticket, keyed by field name with
            cf_ prefix.
        fr_escalated:
          type: boolean
          description: >-
            Whether the ticket has been escalated for first response SLA
            breach.
        spam:
          type: boolean
          description: >-
            Whether the ticket has been marked as spam.
        is_escalated:
          type: boolean
          description: >-
            Whether the ticket has been escalated.
        due_by:
          type: string
          format: date-time
          description: >-
            Timestamp when the ticket resolution is due.
        fr_due_by:
          type: string
          format: date-time
          description: >-
            Timestamp when the first response is due.
        created_at:
          type: string
          format: date-time
          description: >-
            Timestamp when the ticket was created.
        updated_at:
          type: string
          format: date-time
          description: >-
            Timestamp when the ticket was last updated.
    TicketCreate:
      type: object
      properties:
        subject:
          type: string
          description: >-
            Subject of the ticket.
        description:
          type: string
          description: >-
            HTML content of the ticket description.
        email:
          type: string
          format: email
          description: >-
            Email address of the requester. Required if requester_id,
            phone, or twitter_id is not provided.
        phone:
          type: string
          description: >-
            Phone number of the requester.
        requester_id:
          type: integer
          format: int64
          description: >-
            ID of the requester contact.
        status:
          type: integer
          description: >-
            Status of the ticket. 2=Open, 3=Pending, 4=Resolved, 5=Closed.
          enum:
            - 2
            - 3
            - 4
            - 5
        priority:
          type: integer
          description: >-
            Priority of the ticket. 1=Low, 2=Medium, 3=High, 4=Urgent.
          enum:
            - 1
            - 2
            - 3
            - 4
        source:
          type: integer
          description: >-
            Channel source of the ticket.
        type:
          type: string
          description: >-
            Type of the ticket.
        responder_id:
          type: integer
          format: int64
          description: >-
            ID of the agent to assign.
        group_id:
          type: integer
          format: int64
          description: >-
            ID of the group to assign.
        product_id:
          type: integer
          format: int64
          description: >-
            ID of the associated product.
        cc_emails:
          type: array
          items:
            type: string
            format: email
          description: >-
            Email addresses to CC.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags to add to the ticket.
        custom_fields:
          type: object
          additionalProperties: true
          description: >-
            Custom field values keyed by field name with cf_ prefix.
    TicketUpdate:
      type: object
      properties:
        subject:
          type: string
          description: >-
            Subject of the ticket.
        description:
          type: string
          description: >-
            HTML content of the ticket description.
        status:
          type: integer
          description: >-
            Status of the ticket.
          enum:
            - 2
            - 3
            - 4
            - 5
        priority:
          type: integer
          description: >-
            Priority of the ticket.
          enum:
            - 1
            - 2
            - 3
            - 4
        source:
          type: integer
          description: >-
            Channel source of the ticket.
        type:
          type: string
          description: >-
            Type of the ticket.
        responder_id:
          type: integer
          format: int64
          description: >-
            ID of the agent to assign.
        group_id:
          type: integer
          format: int64
          description: >-
            ID of the group to assign.
        product_id:
          type: integer
          format: int64
          description: >-
            ID of the associated product.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags to set on the ticket.
        custom_fields:
          type: object
          additionalProperties: true
          description: >-
            Custom field values to update.
    Conversation:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: >-
            Unique identifier of the conversation.
        body:
          type: string
          description: >-
            Content of the conversation in HTML format.
        body_text:
          type: string
          description: >-
            Content of the conversation in plain text.
        incoming:
