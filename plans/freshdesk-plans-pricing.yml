specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: freshdesk
providerId: freshdesk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Customer Support
  - Helpdesk
  - SaaS
  - Ticketing
description: Freshdesk uses tiered per-agent SaaS subscriptions billed annually (per-agent/month
  list price). A free plan covers 1-2 agents for 6 months. Freddy AI Agent sessions are sold as
  add-on usage (50 sessions / $49 per 100 additional). API rate limits scale with the paid plan.
sources:
  - https://www.freshworks.com/freshdesk/pricing/
  - https://developers.freshdesk.com/api/
plans:
  - id: freshdesk-free
    name: Free
    type: freemium
    description: Free plan for 1-2 agents for 6 months; essential ticketing, knowledge base,
      reports.
    entries:
      - label: Per-agent monthly fee
        name: agent_seat
        type: subscription
        metric: seat
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: true
    elements:
      - name: Essential ticketing
      - name: Knowledge base
      - name: Reports
      - name: 1-2 agents for 6 months
  - id: freshdesk-growth
    name: Growth
    type: subscription
    description: Ticketing, customer portal, reports; ideal for small businesses. $19/agent/month
      billed annually.
    entries:
      - label: Per-agent monthly fee (annual billing)
        name: agent_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '19.00'
        userMultiplied: true
    elements:
      - name: Ticketing
      - name: Shared inbox
      - name: Threads and tasks
      - name: Customer portal
      - name: Multilingual support
      - name: 5,000 collaborators included
  - id: freshdesk-pro
    name: Pro
    type: subscription
    description: Growth features plus customized support portals, custom objects, advanced
      ticketing, custom reporting, routing. $55/agent/month billed annually. Includes Freddy AI
      Copilot and Freddy AI Insights.
    entries:
      - label: Per-agent monthly fee (annual billing)
        name: agent_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '55.00'
        userMultiplied: true
      - label: Freddy AI Agent included sessions
        name: freddy_sessions_included
        type: quota
        metric: session
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: All Growth features
      - name: Customized support portals
      - name: Custom objects
      - name: Advanced ticketing
      - name: Custom reporting
      - name: Routing mechanisms
      - name: Freddy AI Copilot
      - name: Freddy AI Insights
  - id: freshdesk-enterprise
    name: Enterprise
    type: subscription
    description: Pro features plus audit logs, approval workflows, skills-based assignments,
      additional security. $89/agent/month billed annually.
    entries:
      - label: Per-agent monthly fee (annual billing)
        name: agent_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '89.00'
        userMultiplied: true
      - label: Freddy AI Agent included sessions
        name: freddy_sessions_included
        type: quota
        metric: session
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: All Pro features
      - name: Audit logs
      - name: Approval workflows
      - name: Skills-based assignments
      - name: Additional security features
  - id: freshdesk-freddy-addon
    name: Freddy AI Agent — Add-on Sessions
    type: usage-based
    description: Additional Freddy AI Agent sessions beyond the 500 included on Pro/Enterprise.
    entries:
      - label: Additional sessions
        name: freddy_sessions_overage
        type: metered
        metric: session
        limit: -1
        timeFrame: usage
        geo: global
        unit: 100
        price: '49.00'
        userMultiplied: false
    elements:
      - name: $49 per 100 additional sessions
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
