naftiko: 1.0.0-alpha2
info:
  label: Freshdesk REST API — Email Configs
  description: 'Freshdesk REST API — Email Configs. 2 operations. Lead operation: List all email configurations. Self-contained
    Naftiko capability covering one Freshdesk business surface.'
  tags:
  - Freshdesk
  - Email Configs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHDESK_API_KEY: FRESHDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-email-configs
    baseUri: https://{domain}.freshdesk.com/api/v2
    description: Freshdesk REST API — Email Configs business capability. Self-contained, no shared references.
    resources:
    - name: email_configs
      path: /email_configs
      operations:
      - name: listemailconfigs
        method: GET
        description: List all email configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: email_configs-email_config_id
      path: /email_configs/{email_config_id}
      operations:
      - name: getemailconfig
        method: GET
        description: View an email configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHDESK_USER}}'
      password: '{{env.FRESHDESK_PASS}}'
  exposes:
  - type: rest
    namespace: rest-email-configs-rest
    port: 8080
    description: REST adapter for Freshdesk REST API — Email Configs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/email-configs
      name: email-configs
      description: REST surface for email_configs.
      operations:
      - method: GET
        name: listemailconfigs
        description: List all email configurations
        call: rest-email-configs.listemailconfigs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/email-configs/{email-config-id}
      name: email-configs-email-config-id
      description: REST surface for email_configs-email_config_id.
      operations:
      - method: GET
        name: getemailconfig
        description: View an email configuration
        call: rest-email-configs.getemailconfig
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-email-configs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freshdesk REST API — Email Configs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-email-configurations
      description: List all email configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-email-configs.listemailconfigs
      outputParameters:
      - type: object
        mapping: $.
    - name: view-email-configuration
      description: View an email configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-email-configs.getemailconfig
      outputParameters:
      - type: object
        mapping: $.
