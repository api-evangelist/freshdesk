naftiko: 1.0.0-alpha2
info:
  label: Freshdesk REST API — Tickets
  description: 'Freshdesk REST API — Tickets. 14 operations. Lead operation: List all ticket fields. Self-contained Naftiko
    capability covering one Freshdesk business surface.'
  tags:
  - Freshdesk
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FRESHDESK_API_KEY: FRESHDESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-tickets
    baseUri: https://{domain}.freshdesk.com/api/v2
    description: Freshdesk REST API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: ticket_fields
      path: /ticket_fields
      operations:
      - name: listticketfields
        method: GET
        description: List all ticket fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tickets
      path: /tickets
      operations:
      - name: listtickets
        method: GET
        description: List all tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Pre-defined filter to apply. Options include new_and_my_open, watching, spam, deleted.
        - name: requester_id
          in: query
          type: integer
          description: Filter tickets by requester ID.
        - name: email
          in: query
          type: string
          description: Filter tickets by requester email address.
        - name: updated_since
          in: query
          type: string
          description: Return tickets updated since the given date-time in UTC format.
        - name: order_by
          in: query
          type: string
          description: Field to order results by.
        - name: order_type
          in: query
          type: string
          description: Sort direction for results.
        - name: include
          in: query
          type: string
          description: Include additional information such as requester, stats, or description.
      - name: createticket
        method: POST
        description: Create a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tickets-bulk_delete
      path: /tickets/bulk_delete
      operations:
      - name: bulkdeletetickets
        method: POST
        description: Bulk delete tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tickets-bulk_update
      path: /tickets/bulk_update
      operations:
      - name: bulkupdatetickets
        method: POST
        description: Bulk update tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tickets-merge
      path: /tickets/merge
      operations:
      - name: mergetickets
        method: PUT
        description: Merge tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tickets-outbound_email
      path: /tickets/outbound_email
      operations:
      - name: createoutboundemail
        method: POST
        description: Create an outbound email ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tickets-ticket_id
      path: /tickets/{ticket_id}
      operations:
      - name: getticket
        method: GET
        description: View a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: string
          description: Include additional information in the response.
      - name: updateticket
        method: PUT
        description: Update a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteticket
        method: DELETE
        description: Delete a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tickets-ticket_id-associated_tickets
      path: /tickets/{ticket_id}/associated_tickets
      operations:
      - name: listassociatedtickets
        method: GET
        description: List associated tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tickets-ticket_id-restore
      path: /tickets/{ticket_id}/restore
      operations:
      - name: restoreticket
        method: PUT
        description: Restore a deleted ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tickets-ticket_id-watch
      path: /tickets/{ticket_id}/watch
      operations:
      - name: watchticket
        method: POST
        description: Watch a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tickets-ticket_id-watchers
      path: /tickets/{ticket_id}/watchers
      operations:
      - name: listticketwatchers
        method: GET
        description: List watchers on a ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.FRESHDESK_USER}}'
      password: '{{env.FRESHDESK_PASS}}'
  exposes:
