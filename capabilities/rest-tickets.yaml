      - method: GET
        name: getticket
        description: View a ticket
        call: rest-tickets.getticket
        with:
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateticket
        description: Update a ticket
        call: rest-tickets.updateticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteticket
        description: Delete a ticket
        call: rest-tickets.deleteticket
        outputParameters:
        - type: object
